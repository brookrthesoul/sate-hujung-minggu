<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title id="pageTitle">Sate Hujung Minggu — Order</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }

/* ── Nav ── */
.nav { background: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100; }
.nav h1 { font-size: 16px; font-weight: 700; color: #1a1a1a; }
.busy-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.busy-none   { background: #cce5ff; color: #004085; }
.busy-ok     { background: #d4edda; color: #155724; }
.busy-busy   { background: #f8d7da; color: #721c24; }

/* ── Tabs ── */
.tab-bar { display: flex; background: white; border-bottom: 1px solid #eee; }
.tab-btn { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; color: #666; cursor: pointer; border-bottom: 3px solid transparent; }
.tab-btn.active { color: #007bff; border-bottom-color: #007bff; }

/* ── Content ── */
.tab-content { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
.tab-content.active { display: block; }

/* ── Form ── */
.section-title { font-size: 14px; font-weight: 700; color: #333; margin: 14px 0 8px; }
.menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.menu-cell { display: flex; flex-direction: column; gap: 4px; }
.menu-cell label { font-size: 12px; font-weight: 600; line-height: 1.3; }
.menu-cell label span { font-weight: 400; color: #888; font-size: 11px; }
.menu-cell input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; text-align: center; }
.menu-cell input:focus { outline: none; border-color: #007bff; }
.stock-hint { font-size: 11px; font-weight: 600; min-height: 14px; }
.stock-out { color: #dc3545; }
.stock-warn { color: #fd7e14; }

/* ── Pickup time ── */
.pickup-row { display: flex; gap: 8px; margin-bottom: 10px; }
.pickup-row input { flex: 1; padding: 9px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.time-hint { font-size: 12px; color: #888; margin-top: -6px; margin-bottom: 8px; }

/* ── Description ── */
textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; resize: none; }

/* ── Results ── */
.results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
.result-item { background: white; border-radius: 10px; padding: 10px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.result-item.total { grid-column: span 2; background: #fff8e1; }
.result-label { font-size: 11px; color: #888; }
.result-value { font-size: 15px; font-weight: 700; color: #1a1a1a; }

/* ── Sticky save ── */
.sticky-save { position: sticky; bottom: 0; padding: 10px 0 4px; background: linear-gradient(transparent, #f5f5f5 30%); }
.save-btn { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(40,167,69,0.3); }
.save-btn:disabled { background: #aaa; box-shadow: none; cursor: not-allowed; }

/* ── My Order card ── */
.order-card { background: white; border-radius: 14px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 4px solid #007bff; margin-bottom: 12px; }
.order-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.order-num { background: #007bff; color: white; border-radius: 20px; padding: 3px 10px; font-size: 13px; font-weight: 700; }
.order-time { font-size: 12px; color: #888; margin-left: auto; }
.order-items { font-size: 13px; color: #444; margin-bottom: 6px; line-height: 1.6; }
.order-total { font-size: 15px; font-weight: 700; }
.status-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.badge-preparing { background: #e2e3e5; color: #383d41; }
.badge-ready     { background: #d4edda; color: #155724; }
.badge-preorder  { background: #e8f4fd; color: #1a6abf; }
.pay-badge-cust  { font-size:12px; font-weight:600; padding:4px 10px; border-radius:14px; margin:4px 0; display:inline-block; }
.pay-cust-online { background:#cce5ff; color:#004085; }
.pay-cust-cash   { background:#d4edda; color:#155724; }
.pay-cust-both   { background:#fff3cd; color:#856404; }
.pay-cust-deposit{ background:#fff3cd; color:#856404; }
.pay-cust-short  { background:#f8d7da; color:#721c24; }
.action-row { display: flex; gap: 8px; margin-top: 10px; }
.btn-edit   { flex: 1; padding: 9px; background: #17a2b8; color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-cancel { flex: 1; padding: 9px; background: #dc3545; color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.edit-lock-note { font-size: 11px; color: #888; margin-top: 6px; text-align: center; }
.no-order { text-align: center; color: #aaa; padding: 40px 16px; font-size: 14px; }

/* ── Edit modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 999; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: white; border-radius: 18px; padding: 20px; width: 92%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; }
.modal-save { flex: 1; padding: 12px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
.modal-cancel-btn { padding: 12px 16px; background: #6c757d; color: white; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; }

.spinner { text-align: center; padding: 30px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>

<div class="nav">
    <h1 id="shopName">🍢 Sate Hujung Minggu</h1>
    <span id="busyBadge" class="busy-badge busy-none">No Order</span>
</div>

<div class="tab-bar">
    <div class="tab-btn active" id="tabNewOrder" onclick="switchTab('new')">New Order</div>
    <div class="tab-btn"        id="tabMyOrder"  onclick="switchTab('my')">My Order</div>
</div>

<!-- SHOP STATUS BANNER -->
<div id="shopBanner" style="padding:10px 16px; text-align:center; font-size:13px; font-weight:600; background:#d4edda; color:#155724;">
    🟢 We are Open — Place your order below!
</div>

<!-- NEW ORDER TAB -->
<div class="tab-content active" id="tabContentNew">
    <div class="section-title">📅 Pick-up Time (optional)</div>
    <div class="pickup-row">
        <input type="date" id="pickupDate" min="">
        <input type="time" id="pickupTime">
    </div>
    <div class="time-hint" id="timeHint"></div>

    <div class="section-title">🍢 Your Order</div>
    <div class="menu-grid" id="menuGrid"></div>

    <div class="section-title">📝 Note (optional)</div>
    <textarea id="orderNote" rows="2" placeholder="Any special requests..."></textarea>

    <div id="resultsBox" style="display:none;">
        <div class="section-title">Summary</div>
        <div class="results-grid" id="resultsGrid"></div>
    </div>

    <div class="sticky-save">
        <button class="save-btn" id="saveBtn" onclick="placeOrder()">Place Order</button>
    </div>
</div>

<!-- MY ORDER TAB -->
<div class="tab-content" id="tabContentMy">
    <div id="myOrderContent"><div class="spinner">Loading...</div></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <div class="modal-title">✏️ Edit Order</div>
        <div class="menu-grid" id="editMenuGrid"></div>
        <textarea id="editNote" rows="2" placeholder="Note..." style="margin-top:10px;"></textarea>
        <div class="modal-actions">
            <button class="modal-save" onclick="saveEdit()">💾 Save</button>
            <button class="modal-cancel-btn" onclick="closeEdit()">Cancel</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://efrwvksxttauhoxllhqu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SOoDs65SPw_G_m-lZ6NP-w_MbbqxOUw';
const ORDER_ID_KEY  = 'shmCustomerOrderId';
const ORDER_IDS_KEY = 'shmCustomerOrderIds';
const SKEWER_CATS  = ['skewer', 'no-kuah'];
const EDIT_LOCK_MINS   = 5;
const PICKUP_EDIT_MINS = 20;
const PICKUP_MIN_HOURS = 1;

let menuItems  = [];
let stockData  = {};
let shopIsOpen  = true;  // default open
let notBusyMax  = 300;   // default threshold
let kuahRatio   = 10;    // default: 1 scoop per 10 skewers
let preorderEnabled  = true;
let myOrderId  = localStorage.getItem(ORDER_ID_KEY); // legacy single order
let myOrderIds = JSON.parse(localStorage.getItem(ORDER_IDS_KEY) || '[]');
let myOrder    = null;
let realtimeWs = null;
let currentTab = 'new';

// ── Supabase helpers ──────────────────────────────────────────────────────────
function headers(extra = {}) {
    return { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', ...extra };
}
async function sbFetch(path, opts = {}) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { ...opts, headers: headers(opts.headers || {}) });
    const txt = await res.text();
    if (!res.ok) throw new Error(txt);
    return txt ? JSON.parse(txt) : null;
}
async function sbRpc(fn, body) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/rpc/' + fn, { method: 'POST', headers: headers(), body: JSON.stringify(body) });
    const txt = await res.text();
    if (!res.ok) throw new Error(txt);
    return txt ? JSON.parse(txt) : null;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
    setPickupDateMin();
    await Promise.all([loadMenu(), loadStock(), loadBusy(), loadShopStatus()]);
    renderMenuGrid();
    if (myOrderId && !myOrderIds.includes(myOrderId)) {
        myOrderIds.push(myOrderId);
        localStorage.setItem(ORDER_IDS_KEY, JSON.stringify(myOrderIds));
    }
    if (myOrderIds.length > 0) loadMyOrders();
    connectRealtime();
    setInterval(loadBusy, 30000);
    setInterval(() => { if (myOrderIds.length > 0) loadMyOrders(); }, 15000);
    setInterval(loadShopStatus, 30000); // check every 30s
}

async function loadShopStatus() {
    try {
        const rows = await sbFetch(
    'settings?key=in.(shopOpen,notBusyMax,businessName,kuahRatio,enablePreorder)&select=key,value'
);
        (rows || []).forEach(r => {
            if (r.key === 'shopOpen')      shopIsOpen = r.value === 'true';
            if (r.key === 'notBusyMax')    notBusyMax = parseInt(r.value) || 300;
            if (r.key === 'kuahRatio')     kuahRatio  = parseInt(r.value) || 10;
            if (r.key === 'businessName')  updateShopName(r.value);
            if (r.key === 'enablePreorder') preorderEnabled = r.value === 'true';
        });
    } catch(e) { shopIsOpen = true; }
    updateShopBanner();
    updatePreorderState();
}

function updatePreorderState() {

    const dateInput = document.getElementById("pickupDate");

    const today = new Date().toLocaleDateString("en-CA");

    if (!preorderEnabled) {

        dateInput.min = today;
        dateInput.max = today;
        dateInput.value = today;

    } else {

        dateInput.min = today;
        dateInput.removeAttribute("max");

    }

}

function payBadgeHTML(o) {
    const m      = o.paymentMethod;
    const online = o.paymentOnline || 0;
    const cash   = o.paymentCash   || 0;
    const total  = o.totalCost     || 0;
    if (!m) return '';
    const icons  = { online:'💳', card:'💳', boost:'🚀', tng:'🛣️', cash:'💵', both:'🤝' };
    const names  = { online:'Online', card:'Card', boost:'Boost', tng:'T&G', cash:'Cash', both:'Both' };
    const icon   = icons[m] || '💳';
    const name   = names[m] || m;
    const ONLINE = ['online','card','boost','tng'];
    if (ONLINE.includes(m)) {
        if (o.isDeposit) {
            const bal = total - online;
            return `<div class="pay-badge-cust pay-cust-deposit">${icon} Deposit (${name}) — RM${online.toFixed(2)} | Balance: RM${bal.toFixed(2)}</div>`;
        }
        return `<div class="pay-badge-cust pay-cust-online">${icon} ${name} — RM${online.toFixed(2)}</div>`;
    }
    if (m === 'cash') {
        if (o.isCashShort) {
            const short = total - cash;
            return `<div class="pay-badge-cust pay-cust-short">⚠️ Short by RM${short.toFixed(2)} | Paid: RM${cash.toFixed(2)}</div>`;
        }
        return `<div class="pay-badge-cust pay-cust-cash">💵 Cash — RM${cash.toFixed(2)}</div>`;
    }
    if (m === 'both') {
        return `<div class="pay-badge-cust pay-cust-both">💳 Online: RM${online.toFixed(2)} | 💵 Cash: RM${cash.toFixed(2)}</div>`;
    }
    return '';
}

function updateShopName(name) {
    if (!name) return;
    const h1    = document.getElementById('shopName');
    const title = document.getElementById('pageTitle');
    if (h1)    h1.textContent    = '🍢 ' + name;
    if (title) title.textContent = name + ' — Order';
}

function updateShopBanner() {
    const banner  = document.getElementById('shopBanner');
    const saveBtn = document.getElementById('saveBtn');
    if (!banner) return;
    if (shopIsOpen) {
        banner.style.background = '#d4edda';
        banner.style.color      = '#155724';
        banner.textContent      = '🟢 We are Open — Place your order below!';
    } else {
        banner.style.background = '#f8d7da';
        banner.style.color      = '#721c24';
        banner.textContent      = '🔴 We are Closed today. You can still place a preorder for a future date.';
    }
}

function setPickupDateMin() {
    const today = new Date().toLocaleDateString('en-CA');
    document.getElementById('pickupDate').min   = today;
    document.getElementById('pickupDate').value = today;
    updateTimeMin();
}

function updateTimeMin() {
    const dateEl  = document.getElementById('pickupDate');
    const timeEl  = document.getElementById('pickupTime');
    const today   = new Date().toLocaleDateString('en-CA');
    const selDate = dateEl.value;
    const isToday = !selDate || selDate === today;

    if (isToday) {
        // Today (or no date) — min time = now + 1 hour, default value = now + 1 hour
        const minTime = new Date(Date.now() + 60 * 60 * 1000);
        const hh = String(minTime.getHours()).padStart(2,'0');
        const mm = String(minTime.getMinutes()).padStart(2,'0');
        const minStr = `${hh}:${mm}`;
        timeEl.min = minStr;
        // Only auto-set if time field is empty or behind the new min
        if (!timeEl.value || timeEl.value < minStr) {
            timeEl.value = minStr;
        }
        document.getElementById('timeHint').textContent = '';
    } else {
        // Future date — no restriction on time, clear any auto-set value
        timeEl.min   = '';
        if (timeEl.value) {
            // Keep whatever time was set — just remove the min restriction
        }
        document.getElementById('timeHint').textContent = '';
    }
}

// ── Menu ──────────────────────────────────────────────────────────────────────
const DEFAULT_MENU = [
    { id: 'ayam',     name: 'Ayam',       price: 1.30, category: 'skewer'    },
    { id: 'daging',   name: 'Daging',     price: 1.60, category: 'skewer'    },
    { id: 'kambing',  name: 'Kambing',    price: 2.00, category: 'no-kuah'  },
    { id: 'lontong',  name: 'Lontong',    price: 3.00, category: 'side'     },
    { id: 'shortong', name: 'Shortong',   price: 2.00, category: 'side'     },
    { id: 'kuah',     name: 'Kuah Kacang',price: 1.00, category: 'kuah-only'},
];

async function loadMenu() {
    try {
        const rows = await sbFetch('menu?select=id,name,price,category&order=sort_order.asc');
        if (rows && rows.length) {
            menuItems = rows;
        } else {
            // Table empty or doesn't exist yet — use defaults
            menuItems = DEFAULT_MENU.map(i => ({ ...i }));
        }
    } catch(e) {
        console.warn('Menu load failed, using defaults:', e);
        menuItems = DEFAULT_MENU.map(i => ({ ...i }));
    }
}

// ── Stock ─────────────────────────────────────────────────────────────────────
async function loadStock() {
    try {
        const rows = await sbFetch('stock?select=id,qty');
        stockData = {};
        (rows || []).forEach(r => { stockData[r.id] = r.qty; });
        // Refresh all visible stock hints without re-rendering the whole grid
        menuItems.forEach(item => {
            const el = document.getElementById(`qty_menuGrid_${item.id}`);
            if (el) onQtyInput('menuGrid', item.id, el.value);
        });
    } catch(e) { console.warn('Stock load failed', e); }
}

// ── Busy badge ────────────────────────────────────────────────────────────────
async function loadBusy() {
    try {
        const orders = await sbFetch('orders?select=data&data->>paid=eq.false&data->>prepared=eq.false&data->>pickedUp=eq.false');
        const today  = new Date().toLocaleDateString('en-CA');
        let total = 0;
        (orders || []).forEach(row => {
            const o = row.data || {};
            // Skip preorders (future pickup date) — they don't affect today's workload
            if (o.pickupTs && o.pickupMode !== 'time') {
                const pDay = new Date(o.pickupTs).toLocaleDateString('en-CA');
                if (pDay > today) return;
            }
            Object.values(o.items || {}).forEach(item => {
                if (SKEWER_CATS.includes(item.category)) total += (item.qty || 0);
            });
        });
        const badge = document.getElementById('busyBadge');
        if (total === 0)            { badge.textContent = 'No Order'; badge.className = 'busy-badge busy-none'; }
        else if (total <= notBusyMax) { badge.textContent = 'Not Busy'; badge.className = 'busy-badge busy-ok'; }
        else                         { badge.textContent = 'Busy';     badge.className = 'busy-badge busy-busy'; }
    } catch(e) {}
}

// ── Menu grid render ──────────────────────────────────────────────────────────
function renderMenuGrid(containerId = 'menuGrid', existingItems = {}) {
    const grid = document.getElementById(containerId);
    if (!grid) return;
    grid.innerHTML = menuItems.map(item => {
        const qty = existingItems[item.id] || 0;
        return `<div class="menu-cell">
            <label for="qty_${containerId}_${item.id}">${item.name}<br><span>RM${item.price.toFixed(2)}</span></label>
            <input type="number" id="qty_${containerId}_${item.id}" min="0" step="1" value="${qty || ''}" placeholder="0"
                oninput="onQtyInput('${containerId}','${item.id}',this.value)">
            <span class="stock-hint" id="hint_${containerId}_${item.id}"></span>
        </div>`;
    }).join('');
}

function onQtyInput(gridId, itemId, value) {
    const qty   = parseInt(value) || 0;
    const hint  = document.getElementById(`hint_${gridId}_${itemId}`);
    const avail = stockData[itemId];
    if (hint) {
        if (avail === -1 || avail === undefined || avail === null) { hint.textContent = ''; hint.className = 'stock-hint'; }
        else if (avail === 0) { hint.textContent = 'Out of stock'; hint.className = 'stock-hint stock-out'; }
        else if (qty > avail) { hint.textContent = `Insufficient — only ${avail} left`; hint.className = 'stock-hint stock-out'; }
        else { hint.textContent = ''; hint.className = 'stock-hint'; }
    }
    if (gridId === 'menuGrid') updateSummary();
}

function getQtys(gridId = 'menuGrid') {
    const qtys = {};
    menuItems.forEach(item => {
        const el = document.getElementById(`qty_${gridId}_${item.id}`);
        qtys[item.id] = el ? (parseInt(el.value) || 0) : 0;
    });
    return qtys;
}

function updateSummary() {
    const qtys = getQtys();
    const hasAny = Object.values(qtys).some(q => q > 0);
    document.getElementById('resultsBox').style.display = hasAny ? 'block' : 'none';
    if (!hasAny) return;

    const grid = document.getElementById('resultsGrid');
    let total = 0, skewers = 0, scoops = 0;
    let html = '';
    menuItems.forEach(item => {
        const qty = qtys[item.id] || 0;
        if (qty === 0) return;
        const cost = qty * item.price;
        total += cost;
        if (item.category === 'skewer' || item.category === 'no-kuah') skewers += qty;
        if (item.category === 'skewer') scoops += Math.ceil(qty / kuahRatio);
        if (item.category === 'side') scoops += qty * 2;
        if (item.category === 'kuah-only') scoops += qty;
        html += `<div class="result-item"><div class="result-label">${item.name} ×${qty}</div><div class="result-value">RM${cost.toFixed(2)}</div></div>`;
    });
    html += `<div class="result-item"><div class="result-label">Cucuk / Senduk</div><div class="result-value">${skewers} / ${scoops}</div></div>`;
    html += `<div class="result-item total"><div class="result-label">Total</div><div class="result-value">RM${total.toFixed(2)}</div></div>`;
    grid.innerHTML = html;
}

// ── Pickup time validation ────────────────────────────────────────────────────
function getPickupTs() {
    const dateEl = document.getElementById('pickupDate');
    const timeEl = document.getElementById('pickupTime');
    const date   = dateEl.value;
    const time   = timeEl.value;
    const today  = new Date().toLocaleDateString('en-CA');

    if (!date && !time) return { ts: null, mode: null };

    if (date && !time) {
        // Date only — goes to preorder if future date
        const ts = new Date(date + 'T00:00').getTime();
        const mode = date > today ? 'date' : 'date-today';
        return { ts, mode };
    }
    if (!date && time) {
        // Time only — today, goes to prepare
        const ts = new Date(today + 'T' + time).getTime();
        return { ts, mode: 'time' };
    }
    // Both date and time
    const ts = new Date(date + 'T' + time).getTime();
    const mode = date > today ? 'datetime' : 'datetime';
    return { ts, mode };
}

function validatePickupTime() {
    const { ts } = getPickupTs();
    const hint   = document.getElementById('timeHint');
    if (!ts) { hint.textContent = ''; return true; }
    const minTs  = Date.now() + PICKUP_MIN_HOURS * 60 * 60 * 1000;
    if (ts < minTs) {
        hint.textContent = `⚠️ Pick-up time must be at least ${PICKUP_MIN_HOURS} hour from now.`;
        hint.style.color = '#dc3545';
        return false;
    }
    hint.textContent = '';
    return true;
}

document.addEventListener('DOMContentLoaded', () => {

    timeEl.addEventListener('focus', () => {

    });
    dateEl.addEventListener('change', () => {

// ── Place order ───────────────────────────────────────────────────────────────
async function placeOrder() {
    // Get pickup time once and reuse throughout
    const { ts, mode } = getPickupTs();
    const today = new Date().toLocaleDateString("en-CA");

if (!preorderEnabled && ts) {

    const selected =
        new Date(ts).toLocaleDateString("en-CA");

    if (selected > today) {

        alert("Preorders are temporarily unavailable.");

        return;

    }

}
    const hint = document.getElementById('timeHint');

    // Check if shop is closed — block today orders, allow preorders (future date)
    if (!shopIsOpen) {
        const today5 = new Date().toLocaleDateString('en-CA');
        const isToday = !ts || (mode !== 'datetime' && mode !== 'date') ||
            new Date(ts).toLocaleDateString('en-CA') === today5;
        if (isToday) {
            alert('🔴 We are closed today. You can still place a preorder by setting a future date.');
            return;
        }
    }
    if (ts) {
        const minTs = Date.now() + PICKUP_MIN_HOURS * 60 * 60 * 1000;
        if (ts < minTs) {
            hint.textContent = `⚠️ Pick-up time must be at least ${PICKUP_MIN_HOURS} hour from now.`;
            hint.style.color = '#dc3545';
            return;
        } else {
            hint.textContent = '';
        }
    } else {
        hint.textContent = '';
    }

    const qtys   = getQtys();
    const hasAny = Object.values(qtys).some(q => q > 0);
    if (!hasAny) { alert('Please add at least one item.'); return; }

    // Build items object
    const items = {};
    let totalCost = 0, skewerQty = 0, scoops = 0;
    menuItems.forEach(item => {
        const qty = qtys[item.id] || 0;
        if (qty === 0) return;
        const cost = qty * item.price;
        items[item.id] = { name: item.name, category: item.category, price: item.price, qty, cost };
        totalCost += cost;
        if (item.category === 'skewer' || item.category === 'no-kuah') skewerQty += qty;
        if (item.category === 'skewer') scoops += Math.ceil(qty / kuahRatio);
        if (item.category === 'side') scoops += qty * 2;
        if (item.category === 'kuah-only') scoops += qty;
    });

    // Determine if this is a preorder (future date)
    const today2 = new Date().toLocaleDateString('en-CA');
    const isPreorder = ts && (mode === 'datetime' || mode === 'date') &&
        new Date(ts).toLocaleDateString('en-CA') > today2;

    const orderData = {
        items, totalCost, skewerQty, scoops,
        prepared: false, paid: false, pickedUp: false,
        description: document.getElementById('orderNote').value.trim(),
        paymentMethod: null, paymentOnline: 0, paymentCash: 0,
        pickupTs: ts || null,
        pickupMode: mode === 'date-today' ? 'date' : (mode || null),
        createdAt: Date.now(),
        source: 'customer'
    };

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Placing order...';

    try {
        const result = await sbRpc('place_customer_order', { order_data: orderData });
        if (!result.ok) {
            const item = menuItems.find(m => m.id === result.item);
            const name = item ? item.name : result.item;
            if (result.reason === 'out_of_stock') {
                alert(`❌ Out of stock: ${name}`);
            } else {
                alert(`❌ Insufficient stock: ${name} — only ${result.available} left`);
            }
            await loadStock();
            renderMenuGrid('menuGrid', qtys);
            return;
        }

        // Success — add to order IDs array
        const newId = String(result.id);
        myOrderId = newId;
        localStorage.setItem(ORDER_ID_KEY, newId);
        if (!myOrderIds.includes(newId)) {
            myOrderIds.push(newId);
            localStorage.setItem(ORDER_IDS_KEY, JSON.stringify(myOrderIds));
        }
        resetForm();
        switchTab('my');
        loadMyOrders();
        loadBusy();
    } catch(e) {
        alert('Failed to place order: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Place Order';
    }
}

function resetForm() {
    menuItems.forEach(item => {
        const el = document.getElementById(`qty_menuGrid_${item.id}`);
        if (el) el.value = '';
    });
    document.getElementById('orderNote').value = '';
    document.getElementById('resultsBox').style.display = 'none';
    document.getElementById('pickupTime').value = '';
    document.getElementById('timeHint').textContent = '';
}

// ── My Orders (multiple) ─────────────────────────────────────────────────────
async function loadMyOrders() {
    // Merge legacy single ID into array
    if (myOrderId && !myOrderIds.includes(myOrderId)) {
        myOrderIds.push(myOrderId);
        localStorage.setItem(ORDER_IDS_KEY, JSON.stringify(myOrderIds));
    }
    if (myOrderIds.length === 0) { renderNoOrder(); return; }

    try {
        const ids    = myOrderIds.join(',');
        const rows   = await sbFetch(`orders?id=in.(${ids})&select=id,data`);
        const found  = rows || [];
        const foundIds = found.map(r => String(r.id));

        // Remove IDs no longer in DB (picked up / deleted)
        myOrderIds = myOrderIds.filter(id => foundIds.includes(id));
        localStorage.setItem(ORDER_IDS_KEY, JSON.stringify(myOrderIds));

        if (myOrderIds.length === 0) { renderNoOrder(); return; }

        // Render all active orders
        const container = document.getElementById('myOrderContent');
        container.innerHTML = '';
        found.forEach(row => {
            const o = { id: row.id, ...row.data };
            if (o.pickedUp) {
                // Remove picked up orders
                myOrderIds = myOrderIds.filter(id => String(id) !== String(row.id));
                localStorage.setItem(ORDER_IDS_KEY, JSON.stringify(myOrderIds));
                return;
            }
            container.innerHTML += renderMyOrderCard(o);
        });
        if (container.innerHTML === '') renderNoOrder();
    } catch(e) { console.warn('loadMyOrders error', e); }
}

// Legacy compat
async function loadMyOrder() { return loadMyOrders(); }

function renderNoOrder() {
    document.getElementById('myOrderContent').innerHTML =
        '<div class="no-order">No active order.<br>Go to <strong>New Order</strong> to place one.</div>';
}

function renderMyOrderCard(o) {
    const items = Object.values(o.items || {}).filter(r => r.qty > 0)
        .map(r => `${r.name} ×${r.qty} — RM${r.cost.toFixed(2)}`).join('<br>');
    const time  = new Date(o.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const oid   = o.id || '';

    // Determine if order is still in preorder (future pickup date, not yet prepared)
    const nowMs   = Date.now();
    const WARN_MS = 15 * 60 * 1000;
    const today4  = new Date().toLocaleDateString('en-CA');
    const isStillPreorder = o.pickupTs && !o.prepared && !o.paid &&
        (o.pickupMode === 'datetime' || o.pickupMode === 'date') &&
        new Date(o.pickupTs).toLocaleDateString('en-CA') > today4;
    const isNearPickup = o.pickupTs && (nowMs - o.pickupTs) >= -WARN_MS;

    let statusBadge = '';
    if (o.paid) {
        // Paid — just needs to collect
        statusBadge = '<span class="badge badge-ready">✅ READY — Please collect</span>';
    } else if (o.prepared && o.isReady) {
        // Prepared + operator tapped Ready — customer needs to come pay & collect
        statusBadge = '<span class="badge badge-ready">✅ READY — Please pay &amp; collect</span>';
    } else if (o.prepared && !o.isReady) {
        // Prepared but not yet notified — still preparing from customer's view
        statusBadge = '<span class="badge badge-preparing">⏳ Preparing...</span>';
    } else if (isStillPreorder && !isNearPickup) {
        // In preorder, not yet close to pickup time — show scheduled badge
        const pickupLabel = new Date(o.pickupTs).toLocaleString([], {weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
        statusBadge = `<span class="badge badge-preorder">📅 Scheduled: ${pickupLabel}</span>`;
    } else {
        // In prepare tab or within 15min of pickup — show preparing
        statusBadge = '<span class="badge badge-preparing">⏳ Preparing...</span>';
    }

    const now          = Date.now();
    const created      = o.createdAt || now;
    const lockMs       = EDIT_LOCK_MINS * 60 * 1000;
    const editDeadline = created + lockMs;
    let canEdit = false, lockNote = '';

    if (o.prepared || o.paid) {
        lockNote = 'Order is being prepared — editing not available.';
    } else if (o.pickupTs && o.pickupMode !== 'time') {
        const cutoff = o.pickupTs - PICKUP_EDIT_MINS * 60 * 1000;
        if (now >= cutoff) lockNote = `Edit unavailable within ${PICKUP_EDIT_MINS} min of pick-up time.`;
        else canEdit = true;
    } else if (o.pickupMode === 'time') {
        const cutoff = o.pickupTs - PICKUP_EDIT_MINS * 60 * 1000;
        if (now >= cutoff) lockNote = `Edit unavailable within ${PICKUP_EDIT_MINS} min of pick-up time.`;
        else if (now >= editDeadline) lockNote = `Edit locked after ${EDIT_LOCK_MINS} min.`;
        else {
            canEdit = true;
            const s = Math.ceil((editDeadline - now) / 1000);
            lockNote = `Edit available for ${s > 60 ? Math.ceil(s/60) + ' min' : s + ' sec'} more.`;
        }
    } else {
        if (now >= editDeadline) lockNote = `Edit locked after ${EDIT_LOCK_MINS} min.`;
        else {
            canEdit = true;
            const s = Math.ceil((editDeadline - now) / 1000);
            lockNote = `Edit available for ${s > 60 ? Math.ceil(s/60) + ' min' : s + ' sec'} more.`;
        }
    }

    const actionBtns = (canEdit && !o.prepared && !o.paid) ? `
        <div class="action-row">
            <button class="btn-edit"   onclick="openEdit('${oid}')">✏️ Edit</button>
            <button class="btn-cancel" onclick="cancelOrder('${oid}')">🗑️ Cancel</button>
        </div>` : '';
    const lockDiv  = lockNote ? `<div class="edit-lock-note">${lockNote}</div>` : '';

    // Fix 4: Show note
    const noteDiv  = o.description ? `<div style="font-size:12px;color:#666;margin-top:4px;">📝 ${o.description}</div>` : '';

    let pickupStr = '';
    if (o.pickupTs) {
        const dt = new Date(o.pickupTs);
        if (o.pickupMode === 'time') pickupStr = dt.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        else if (o.pickupMode === 'date') pickupStr = dt.toLocaleDateString([], {weekday:'short',month:'short',day:'numeric'});
        else pickupStr = dt.toLocaleString([], {weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
        pickupStr = `<div style="font-size:12px;color:#1a6abf;margin-top:4px;">📅 Pick-up: ${pickupStr}</div>`;
    }

    return `<div class="order-card" id="corder-${oid}">
        <div class="order-card-header">
            <span class="order-num">#${oid}</span>
            <span class="order-time">${time}</span>
        </div>
        ${pickupStr}
        <div class="order-items" style="margin-top:8px;">${items}</div>
        ${noteDiv}
        <div class="order-total" style="margin-top:4px;">Total: RM${(o.totalCost||0).toFixed(2)}</div>
        ${o.paymentMethod ? payBadgeHTML(o) : ''}
        <div class="status-row">${statusBadge}</div>
        ${actionBtns}
        ${lockDiv}
    </div>`;
}

function renderMyOrder() { loadMyOrders(); }

// ── Cancel order ──────────────────────────────────────────────────────────────
async function cancelOrder(orderId) {
    if (!confirm('Cancel this order?')) return;
    try {
        // First fetch order to get items for stock return
        const rows = await sbFetch(`orders?id=eq.${orderId}&select=id,data`);
        if (rows && rows.length) {
            const o = rows[0].data || {};
            if (o.items) {
                // Return stock for each item
                try {
                    await sbRpc('return_customer_stock', { order_items: o.items });
                } catch(e) { console.warn('Stock return failed:', e); }
            }
        }
        await sbFetch(`orders?id=eq.${orderId}`, { method: 'DELETE' });
        myOrderIds = myOrderIds.filter(id => String(id) !== String(orderId));
        localStorage.setItem(ORDER_IDS_KEY, JSON.stringify(myOrderIds));
        if (myOrderIds.length === 0) { localStorage.removeItem(ORDER_ID_KEY); }
        loadMyOrders();
        loadBusy();
    } catch(e) { alert('Cancel failed: ' + e.message); }
}

// ── Edit order ────────────────────────────────────────────────────────────────
let _editingOrderId = null;
function openEdit(orderId) {
    _editingOrderId = orderId;
    // Find order from DOM or reload
    sbFetch(`orders?id=eq.${orderId}&select=id,data`).then(rows => {
        if (!rows || !rows.length) return;
        const o = { id: rows[0].id, ...rows[0].data };
        const existing = {};
        Object.entries(o.items || {}).forEach(([id, item]) => { existing[id] = item.qty; });
        renderMenuGrid('editMenuGrid', existing);
        document.getElementById('editNote').value = o.description || '';
        document.getElementById('editModal').classList.add('open');
        document.getElementById('editModal').dataset.order = JSON.stringify(o);
    });
}
function closeEdit() { document.getElementById('editModal').classList.remove('open'); }

async function saveEdit() {
    const qtys   = getQtys('editMenuGrid');
    const hasAny = Object.values(qtys).some(q => q > 0);
    if (!hasAny) { alert('Please keep at least one item.'); return; }

    const storedOrder = JSON.parse(document.getElementById('editModal').dataset.order || '{}');
    const oldItems = storedOrder.items || {};
    const newItems = {};
    let totalCost = 0, skewerQty = 0, scoops = 0;
    menuItems.forEach(item => {
        const qty = qtys[item.id] || 0;
        const cost = qty * item.price;
        newItems[item.id] = { name: item.name, category: item.category, price: item.price, qty, cost };
        totalCost += cost;
        if (item.category === 'skewer' || item.category === 'no-kuah') skewerQty += qty;
        if (item.category === 'skewer') scoops += Math.ceil(qty / kuahRatio);
        if (item.category === 'side') scoops += qty * 2;
        if (item.category === 'kuah-only') scoops += qty;
    });

    // Check stock for increases
    await loadStock();
    for (const item of menuItems) {
        const oldQty = (oldItems[item.id] && oldItems[item.id].qty) || 0;
        const newQty = qtys[item.id] || 0;
        const diff   = newQty - oldQty;
        if (diff > 0) {
            const avail = stockData[item.id];
            if (avail !== undefined && avail !== null && avail !== -1 && avail < diff) {
                alert(`❌ Insufficient stock for ${item.name} — only ${avail} extra available`);
                return;
            }
        }
    }

    try {
        // Update stock diff via RPC
        await sbRpc('adjust_stock_diff', { old_items: oldItems, new_items: newItems });
    } catch(e) { /* non-fatal if RPC not set up */ }

    const updated = {
        ...myOrder, items: newItems, totalCost, skewerQty, scoops,
        description: document.getElementById('editNote').value.trim()
    };

    try {
        await sbFetch(`orders?id=eq.${_editingOrderId}`, {
            method: 'PATCH',
            headers: { 'Prefer': 'return=minimal' },
            body: JSON.stringify({ data: updated, updated_ms: Date.now() })
        });
        closeEdit();
        loadMyOrders();
    } catch(e) { alert('Save failed: ' + e.message); }
}

// ── Realtime ──────────────────────────────────────────────────────────────────
function connectRealtime() {
    const wsUrl = SUPABASE_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?apikey=' + SUPABASE_KEY + '&vsn=1.0.0';
    realtimeWs = new WebSocket(wsUrl);
    let ref = 1;
    realtimeWs.onopen = () => {
        realtimeWs.send(JSON.stringify({ topic: 'realtime:customer', event: 'phx_join',
            payload: { config: { broadcast: { self: false }, postgres_changes: [
                { event: '*', schema: 'public', table: 'orders' },
                { event: '*', schema: 'public', table: 'stock' },
                { event: '*', schema: 'public', table: 'settings' }
            ]}}, ref: String(ref++) }));
        setInterval(() => {
            if (realtimeWs.readyState === WebSocket.OPEN)
                realtimeWs.send(JSON.stringify({ topic:'phoenix', event:'heartbeat', payload:{}, ref: String(ref++) }));
        }, 25000);
    };
    realtimeWs.onmessage = ({ data }) => {
        try {
            const f = JSON.parse(data);
            if (f.event === 'phx_reply') return;
            if (f.event === 'postgres_changes' || f.payload?.data?.type) {
                const tbl = f.payload?.data?.table || '';
                if (tbl === 'stock')    { loadStock(); return; }
                if (tbl === 'settings') { loadShopStatus(); return; }
                loadBusy();
                if (myOrderIds.length > 0) loadMyOrders();
            }
        } catch(_) {}
    };
    realtimeWs.onclose = () => setTimeout(connectRealtime, 5000);
}

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabNewOrder').classList.toggle('active', tab === 'new');
    document.getElementById('tabMyOrder').classList.toggle('active',  tab === 'my');
    document.getElementById('tabContentNew').classList.toggle('active', tab === 'new');
    document.getElementById('tabContentMy').classList.toggle('active',  tab === 'my');
    if (tab === 'my') loadMyOrders();
}
